<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="shortcut icon" href="https://freeiconshop.com/wp-content/uploads/edd/clipboard-list-outline-filled.png" type="image/x-icon">
    <title>To Do List</title>
    <style>
        .quote-text { font-size: 1rem; }
        .form-box { width: 100%; }
        .tasks-box { width: 100%; }
        @media (min-width: 768px) {
            .quote-text { font-size: 1.25rem; }
            .form-box { width: 75%; }
            .tasks-box { width: 85%; }
        }
        @media (min-width: 992px) {
            .quote-text { font-size: 1.5rem; }
            .form-box { width: 50%; }
            .tasks-box { width: 75%; }
        }
    </style>
</head>
<body style="background-image: url('https://cdnb.artstation.com/p/assets/images/images/028/619/953/large/anton-dmitriev-sleep-tube4.jpg?1594990334');
background-size: cover; background-attachment: fixed;">
    <header class="bg-dark opacity-75">
        <h6 id="greeting" class="quote-text text-light text-center px-3 py-2 mb-0">Loading greeting...</h6>
    </header>

    <main class="d-flex justify-content-center align-items-center py-5 flex-column gap-4 h-50 container">
        <div class="form-box bg-dark hover-shadow p-3 p-md-5 border-5" style="border-radius: 1vw;">
            <form class="d-flex justify-content-between gap-3 mx-2 mx-md-5 flex-wrap" id="form">
                <textarea id="input" type="text" class="form-control" autocomplete="off">Project/Scope(sub-scope): Task</textarea>
                <button type="submit" class="btn btn-primary text-nowrap px-4">Add task</button>
                <button class="btn btn-success text-nowrap px-4" id="saveBtn" disabled>Save tasks</button>
            </form>
        </div>
        <div class="tasks-box text-light rounded p-3 bg-dark" style="display: none;">
            <h6 class="text-center text-success" id="taskTitle">ACTIVE TASKS</h6>
            <div class="d-flex flex-wrap align-items-center gap-2" id="tasks"></div>

        </div>
    </main>

    <footer class="bg-dark bg-gradient opacity-75 bottom-0 position-fixed w-100">
        <h6 class=" text-center text-light" id="lastSaved">Last saved: none</h6>
    </footer>
    <script src="script.js" async></script>
</body>
</html>
